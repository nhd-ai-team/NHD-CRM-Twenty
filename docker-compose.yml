name: twenty

services:
  server:
    image: twentycrm/twenty:${TAG:-latest}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    # 不直接暴露，由 twenty-portal nginx 代理（保持 localhost:3000 入口不变）
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/default
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: ${DISABLE_DB_MIGRATIONS}
      DISABLE_CRON_JOBS_REGISTRATION: ${DISABLE_CRON_JOBS_REGISTRATION}

      STORAGE_TYPE: ${STORAGE_TYPE}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FALLBACK_ENCRYPTION_KEY: ${FALLBACK_ENCRYPTION_KEY}
      APP_SECRET: ${APP_SECRET:-}

      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,db,redis,server,worker,middleware
      NODE_USE_ENV_PROXY: "1"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  worker:
    image: twentycrm/twenty:${TAG:-latest}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/default
      SERVER_URL: ${SERVER_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"

      STORAGE_TYPE: ${STORAGE_TYPE}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FALLBACK_ENCRYPTION_KEY: ${FALLBACK_ENCRYPTION_KEY}
      APP_SECRET: ${APP_SECRET:-}

      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,db,redis,server,worker,middleware
      NODE_USE_ENV_PROXY: "1"

    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DATABASE_NAME:-default}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-postgres} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis
    restart: always
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Twenty 门户（反向代理，接管 3000 端口）──────────────────────────────
  twenty-portal:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/twenty-portal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/inject:/etc/nginx/inject:ro
    depends_on:
      - server
    restart: always

  # ── 对话工作台前端（开发模式，Vite 热重载）────────────────────────────────
  chat-ui:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile.dev
    volumes:
      - ./chat-ui/src:/app/src:ro
    restart: always

  # ── 中间层同步服务 ────────────────────────────────────────────────────────
  middleware:
    build: ./middleware
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      TWENTY_API_URL: http://server:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY:-}
      WEBHOOK_SECRET: ${MIDDLEWARE_WEBHOOK_SECRET}
      DATABASE_URL: postgresql://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@db:5432/${PG_DATABASE_NAME:-default}
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${EVOLUTION_API_KEY}
      WAHA_SESSION: default
    depends_on:
      - server
    restart: always

  # ── Evolution API（WhatsApp 个人号接入）────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${SERVER_URL}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_client
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: zh-CN
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1023204200"
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      # Docker 内部服务不能经过本机代理，否则 webhook 会被代理拒绝（502）。
      NO_PROXY: localhost,127.0.0.1,db,redis,middleware,evolution-api
      PROXY_HOST: host.docker.internal
      PROXY_PORT: "7890"
      PROXY_PROTOCOL: http
      WEBHOOK_GLOBAL_URL: http://middleware:3002/api/whatsapp/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ── WAHA（WhatsApp HTTP API，真实 Chrome + WhatsApp 网页版）─────────────────
  waha:
    image: devlikeapro/waha:arm
    ports:
      - "3003:3000"
    environment:
      WAHA_API_KEY: ${EVOLUTION_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_PRINT_QR: "false"
      WHATSAPP_HOOK_URL: http://middleware:3002/api/whatsapp/webhook
      WHATSAPP_HOOK_EVENTS: message
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,db,redis,middleware
    volumes:
      - waha-sessions:/app/.sessions
    restart: always

volumes:
  db-data:
  server-local-data:
  evolution-instances:
  waha-sessions:
