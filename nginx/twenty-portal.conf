server {
    listen 80;

    # 侧边栏注入脚本
    location = /chat-nav.js {
        alias /etc/nginx/inject/chat-nav.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache";
    }

    # WebSocket 支持（Twenty 用到）
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── 对话工作台 (/chat/) ────────────────────────────────────────────────
    # Vite HMR WebSocket
    location /chat/__vite_hmr {
        proxy_pass http://chat-ui:3003/chat/__vite_hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Vite 内部路径（@vite、@react-refresh、node_modules）
    location ~ ^/([@]vite|[@]react-refresh|node_modules)/ {
        proxy_pass http://chat-ui:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 主应用
    location /chat/ {
        proxy_pass http://chat-ui:3003/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 开发模式下的应用代码必须每次重新验证，否则销售浏览器/CDN 会锁死旧版本
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # 对话工作台后端 API；页面通过同域路径访问，避免浏览器跨域限制
    location /conv-api/ {
        proxy_pass http://middleware:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 实时会话数据不可被 Cloudflare/浏览器缓存，否则销售看到过期列表
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # 代理 Twenty（兜底，必须在 /chat/ 之后）
    # sub_filter 向 index.html 注入侧边栏脚本
    location / {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        sub_filter '</body>' '<script src="/chat-nav.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }
}
