server {
    listen 80;

    # WebSocket 支持（Twenty 用到）
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── 对话工作台 (/chat/) ────────────────────────────────────────────────
    # Vite HMR WebSocket
    location /chat/__vite_hmr {
        proxy_pass http://chat-ui:3003/chat/__vite_hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Vite 内部路径（@vite、@react-refresh、node_modules）
    location ~ ^/([@]vite|[@]react-refresh|node_modules)/ {
        proxy_pass http://chat-ui:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 主应用
    location /chat/ {
        proxy_pass http://chat-ui:3003/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 代理 Twenty（兜底，必须在 /chat/ 之后）
    location / {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
